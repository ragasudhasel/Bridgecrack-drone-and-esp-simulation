{% extends 'base.html' %}

{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h1 class="logo fade-in" style="font-weight: 700; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><i class="fas fa-satellite-dish"></i> Live Inspection</h1>

<div class="card fade-in">
    <h3><i class="fas fa-drone"></i> Drone Feed / Manual Upload</h3>
    <div class="upload-area" id="drop-zone">
        <i class="fas fa-cloud-upload-alt fa-3x" style="color: var(--accent);"></i>
        <p>Drag & drop inspection images (simulating Drone Capture)</p>
        <div style="margin-top: 15px;">
            <input type="file" id="file-input" style="display: none;">
            <button class="btn" onclick="document.getElementById('file-input').click()"><i class="fas fa-folder-open"></i> Select File</button>
            <button class="btn" onclick="startSimulation()"><i class="fas fa-broadcast-tower"></i> Connect to Live ESP32 Stream</button>
        </div>
    </div>
</div>

<div id="results-container" style="display: none; opacity: 0; transition: opacity 0.5s;">
    <div class="card fade-in">
        <h3><i class="fas fa-microscope"></i> Analysis Result</h3>
        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 300px;">
                <img id="result-image" src=""
                    style="width: 100%; border-radius: 8px; border: 1px solid var(--accent); max-height: 400px; object-fit: contain;">
            </div>
            <div style="flex: 1; min-width: 300px;">
                <h4>Detected Defects</h4>
                <div id="defects-list" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <!-- 3D Visualization Section -->
    <div class="card fade-in" style="animation-delay: 0.2s;">
        <h3><i class="fas fa-cube"></i> 3D Tapping & Geospatial Visualization</h3>
        <div style="display: flex; gap: 20px;">
            <div style="flex: 2; height: 400px; background: #000; border-radius: 8px; overflow: hidden;"
                id="3d-container"></div>
            <div style="flex: 1;">
                <h4>Detailed Metrics</h4>
                <div id="metric-details">
                    <p>Select a defect to view 3D details.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- CLIENT SIDE SIMULATION IF BACKEND FAILS or for OFFLINE mode ---
    function generateFallbackData() {
        // This runs if offline or backend error, so the USER always sees a result
        const defects = [];
        const count = Math.floor(Math.random() * 3) + 2; // 2 to 4 defects
        const types = ["Spalling", "Crack", "Corrosion", "Exposed Rebar"];

        for (let i = 0; i < count; i++) {
            defects.push({
                id: Math.floor(Math.random() * 10000),
                label: types[Math.floor(Math.random() * types.length)] + " (Simulated)",
                confidence: 0.75 + Math.random() * 0.2,
                severity: Math.random() > 0.5 ? "High" : "Medium",
                lifespan: "Review in 1-3 years",
                lat: 13.0827 + (Math.random() - 0.5) * 0.001,
                lon: 80.2707 + (Math.random() - 0.5) * 0.001,
                z: 1.0 + Math.random() * 4.0
            });
        }
        return {
            success: true,
            // Use a placeholder image if real one failed, or keep existing source? 
            // We'll assume the image upload "succeeded" in network terms but maybe analysis failed.
            image_url: "",
            detections: defects
        };
    }

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    fileInput.addEventListener('change', handleFile);

    function handleFile(e) {
        const file = e.target.files[0];
        if (file) {
            // Preview immediately for better UX
            const img = document.getElementById('result-image');
            img.src = URL.createObjectURL(file);
            document.getElementById('results-container').style.display = 'block';
            document.getElementById('result-image').style.opacity = 0.5; // Dim while loading

            uploadImage(file);
        }
    }

    function uploadImage(file) {
        const formData = new FormData();
        formData.append('file', file);

        fetch('/upload_image', {
            method: 'POST',
            body: formData
        })
            .then(response => {
                if (!response.ok) throw new Error("Network response was not ok");
                return response.json();
            })
            .then(data => {
                document.getElementById('result-image').style.opacity = 1;
                if (data.success) {
                    displayResults(data);
                } else {
                    console.warn("Backend error, switching to simulation:", data.error);
                    // Fallback for demo purposes
                    const fake = generateFallbackData();
                    fake.image_url = URL.createObjectURL(file); // Keep user image
                    displayResults(fake);
                    alert("Note: Backend analysis failed (" + (data.error || "Unknown") + "). \n\nSwitched to Client-Side Simulation for Demo.");
                }
            })
            .catch(error => {
                console.error('Fetch error:', error);
                document.getElementById('result-image').style.opacity = 1;
                // Fallback for offline usage
                const fake = generateFallbackData();
                fake.image_url = URL.createObjectURL(file);
                displayResults(fake);
                alert("Network Error or Offline Mode detected. \n\nShowing Simulated Results.");
            });
    }

    let scene, camera, renderer, points = [];

    function init3D() {
        const container = document.getElementById('3d-container');
        if (!container) return;
        if (container.children.length > 0) return;

        if (typeof THREE === 'undefined') {
            container.innerHTML = "<p style='color:red; text-align:center; padding-top:150px;'>Three.js library not loaded (Offline?).<br>Cannot render 3D view.</p>";
            return;
        }

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);

        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 5;
        camera.position.y = 2;
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Add a "Bridge" plane
        const geometry = new THREE.BoxGeometry(4, 0.2, 10);
        const material = new THREE.MeshBasicMaterial({ color: 0x334155, wireframe: true });
        const bridge = new THREE.Mesh(geometry, material);
        scene.add(bridge);

        // Add Grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x38bdf8, 0x1e293b);
        scene.add(gridHelper);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    function addDefectMarker(d) {
        if (typeof THREE === 'undefined') return;

        const x = (Math.random() - 0.5) * 3;
        const z = (Math.random() - 0.5) * 8;
        const y = 0.2;

        const color = d.severity === 'Critical' ? 0xef4444 : (d.severity === 'High' ? 0xf59e0b : 0x22c55e);
        const geometry = new THREE.SphereGeometry(0.15, 32, 32);
        const material = new THREE.MeshBasicMaterial({ color: color });
        const sphere = new THREE.Mesh(geometry, material);
        sphere.position.set(x, y, z);

        scene.add(sphere);
        points.push(sphere);
    }

    function displayResults(data) {
        const container = document.getElementById('results-container');
        container.style.display = 'block';
        setTimeout(() => container.style.opacity = 1, 10);

        const img = document.getElementById('result-image');
        // Only update source if provided; otherwise keep preview
        if (img && data.image_url) img.src = data.image_url;

        const list = document.getElementById('defects-list');
        list.innerHTML = '';

        // Init 3D scene if not ready
        init3D();

        // Clear old points
        if (points.length > 0) {
            points.forEach(p => scene.remove(p));
            points = [];
        }

        if (data.detections && data.detections.length > 0) {
            data.detections.forEach(d => {
                addDefectMarker(d);

                // Safety checks for undefined values
                const lat = d.lat !== undefined ? Number(d.lat) : 0;
                const lon = d.lon !== undefined ? Number(d.lon) : 0;
                const z = d.z !== undefined ? Number(d.z) : 0;
                const lifespan = d.lifespan || "Unknown";
                const conf = d.confidence !== undefined ? (Number(d.confidence) * 100).toFixed(1) : "0.0";

                const item = document.createElement('div');
                item.className = 'card';
                item.style.padding = '10px';
                item.style.marginBottom = '10px';
                item.style.border = 'none';
                item.style.background = 'rgba(255,255,255,0.05)';
                item.style.borderLeft = `4px solid ${d.severity === 'Critical' ? '#ef4444' : (d.severity === 'High' ? '#f59e0b' : '#22c55e')}`;
                item.style.cursor = 'pointer';

                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${d.label || 'Defect'}</strong>
                        <span style="font-size: 0.8em; color: #aaa;">${d.severity || 'Low'}</span>
                    </div>
                    <div style="font-size: 0.9em; margin-top: 5px;">
                        <div>Conf: ${conf}%</div>
                        <div>Lifespan: ${lifespan}</div>
                        <div style="color: var(--accent); font-size: 0.8em; margin-top: 5px;">
                            <i class="fas fa-map-marker-alt"></i> ${lat.toFixed(5)}, ${lon.toFixed(5)}
                            <br><i class="fas fa-layer-group"></i> Depth: ${z.toFixed(2)}m
                        </div>
                    </div>
                    <div style="margin-top: 10px; text-align: right;">
                        <a href="/generate_defect_report/${d.id}" target="_blank" class="btn" style="font-size: 0.7em; padding: 5px 10px; display:inline-block; margin-top:5px; text-decoration:none;">
                            <i class="fas fa-file-pdf"></i> Report
                        </a>
                    </div>
                `;
                item.onclick = (e) => {
                    // Prevent clicking the button from triggering the card click
                    if (e.target.closest('a')) return;
                    showMetricDetails(d);
                };
                list.appendChild(item);
            });
        } else {
            console.log("No detected items in data");
            list.innerHTML = '<p style="padding: 10px;">No defects detected for this frame.</p>';
        }
    }

    function showMetricDetails(d) {
        const lat = d.lat !== undefined ? Number(d.lat).toFixed(6) : "N/A";
        const lon = d.lon !== undefined ? Number(d.lon).toFixed(6) : "N/A";
        const z = d.z !== undefined ? Number(d.z).toFixed(2) : "N/A";

        document.getElementById('metric-details').innerHTML = `
            <div class="stat-card" style="text-align: left;">
                <h4 style="color: var(--accent); margin-top:0;">${d.label || 'Unknown'} (ID: ${d.id})</h4>
                <p><strong>Severity:</strong> <span style="color: ${d.severity === 'Critical' ? '#ef4444' : '#fff'}">${d.severity}</span></p>
                <p><strong>GPS Coordinates:</strong><br>Lat: ${lat}<br>Lon: ${lon}</p>
                <p><strong>3D Depth Est:</strong> ${z} meters</p>
                <p><strong>Impact:</strong> ${d.lifespan || "Unknown"}</p>
                <br>
                <a href="/generate_defect_report/${d.id}" target="_blank" class="btn" style="width:100%; display:block; text-align:center;">
                    <i class="fas fa-file-download"></i> Download Detailed Report
                </a>
            </div>
        `;
    }

    // --- WEBCAM & SIMULATION LOGIC ---

    // --- WEBCAM & SIMULATION LOGIC ---

    let simulationInterval;
    let isSimulating = false;
    let isWebcamActive = false;
    let videoStream = null;
    let isPolling = false; // New flag for ESP32 polling
    let lastProcessedId = -1;

    function startSimulation() {
        if (isPolling) {
            // If we are in Polling mode, stop it
            clearInterval(simulationInterval);
            isPolling = false;
            document.querySelector("button[onclick='startSimulation()']").innerText = "Connect to Live ESP32 Stream";
            alert("Stopped ESP32 Stream.");
            return;
        }

        // This button now toggles the "Live ESP32 Polling Mode"
        isPolling = true;
        document.querySelector("button[onclick='startSimulation()']").innerText = "Stop Live Stream";

        // Poll every 2 seconds
        simulationInterval = setInterval(runLivePoll, 2000);
        alert("Client is now listening for ESP32 Images...\n\nEnsure your ESP32 is ON and sending images to /upload_image.");
    }

    function runLivePoll() {
        console.log("Polling for new ESP32 data...");
        fetch('/get_latest_inspection')
            .then(res => res.json())
            .then(data => {
                if (data.success && data.id > lastProcessedId) {
                    console.log("New image found! ID:", data.id);
                    lastProcessedId = data.id;
                    displayResults(data);
                }
            })
            .catch(err => console.error("Polling error:", err));
    }

    // Legacy fallback simulator (kept but renamed/refactored if needed)
    function runSimulationStep() {
        // ... (We are replacing simulation with actual polling now)
    }

    // Create Webcam UI Elements dynamically if called
    function enableWebcam() {
        console.log("Attempting to access camera...");

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("Camera API is not available.\n\nPossible reasons:\n1. You are accessing via http://IP-ADDRESS (Browsers block camera on insecure IP connections).\n2. Please use http://localhost:5000 or http://127.0.0.1:5000.\n3. Your browser does not support this API.");
            return;
        }

        const dropZone = document.getElementById('drop-zone');

        if (isWebcamActive) {
            // Stop Webcam
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            const c = document.getElementById('webcam-container');
            if (c) c.remove();
            isWebcamActive = false;
            const btn = document.getElementById('btn-live-cam');
            if (btn) btn.innerHTML = "<i class='fas fa-camera'></i> Use Live Camera";
            return;
        }

        // Create container
        const container = document.createElement('div');
        container.id = 'webcam-container';
        container.style.marginTop = '20px';
        container.innerHTML = `
            <video id="webcam-video" autoplay playsinline style="width: 100%; max-width: 500px; border: 2px solid var(--accent); border-radius: 8px; transform: scaleX(-1);"></video>
            <br>
            <button class="btn" onclick="captureWebcam()">Capture & Analyze</button>
        `;
        dropZone.appendChild(container);

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                videoStream = stream;
                const video = document.getElementById('webcam-video');
                video.srcObject = stream;
                isWebcamActive = true;
                const btn = document.getElementById('btn-live-cam');
                if (btn) btn.innerText = "Close Camera";
            })
            .catch(err => {
                console.error("Error accessing webcam:", err);
                alert("Could not access webcam.\n\nError: " + err.name + "\n" + err.message + "\n\nCheck browser permissions icon in the address bar.");
                container.remove();
                isWebcamActive = false;
            });
    }

    function captureWebcam() {
        const video = document.getElementById('webcam-video');
        if (!video) return;

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(blob => {
            if (!blob) {
                alert("Capture failed.");
                return;
            }
            const file = new File([blob], "webcam_capture.jpg", { type: "image/jpeg" });

            // Show preview
            const img = document.getElementById('result-image');
            img.src = URL.createObjectURL(file);
            document.getElementById('results-container').style.display = 'block';

            uploadImage(file);
        }, 'image/jpeg');
    }

    // Add webcam button next to simulation
    // Ensure we don't add duplicate buttons if script re-runs
    const existingBtn = document.getElementById("btn-live-cam");
    if (!existingBtn) {
        const btnContainer = document.querySelector(".upload-area div");
        if (btnContainer) {
            const webcamBtn = document.createElement("button");
            webcamBtn.id = "btn-live-cam";
            webcamBtn.className = "btn";
            webcamBtn.style.marginLeft = "10px";
            webcamBtn.innerHTML = "<i class='fas fa-camera'></i> Use Live Camera";
            webcamBtn.onclick = enableWebcam;
            btnContainer.appendChild(webcamBtn);
        }
    }


</script>
{% endblock %}
